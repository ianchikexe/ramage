<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONIX // SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --primary: #ffffff;
            --secondary: #888888;
            --accent: #ffffff;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 40px rgba(255, 255, 255, 0.05);
        }

        [data-theme="neon"] {
            --bg-color: #020005;
            --primary: #f0f0f0;
            --secondary: #7a7a9a;
            --accent: #b000ff;
            --glass-bg: rgba(15, 0, 30, 0.75);
            --glass-border: rgba(176, 0, 255, 0.2);
            --glow: 0 0 50px rgba(176, 0, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- BACKGROUND EFFECTS --- */
        #canvas-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .ambient-light {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.08;
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
            transition: 1s ease;
        }
        .light-top { top: -200px; left: -100px; }
        .light-bottom { bottom: -200px; right: -100px; }

        /* --- PRELOADER --- */
        .preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }
        .loader-line {
            width: 150px; height: 2px;
            background: #222;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .loader-progress {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: var(--accent);
            animation: load 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- MAIN INTERFACE --- */
        .interface {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .interface.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Left Side */
        .info-panel h1 {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--secondary);
            margin-bottom: 3rem;
            font-weight: 300;
            max-width: 450px;
            line-height: 1.6;
        }

        .stats-row {
            display: flex;
            gap: 3rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 2rem;
        }
        .stat-item h3 {
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 0.2rem;
        }
        .stat-item span {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary);
        }

        /* Right Side: Card */
        .card-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), var(--glow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: block;
        }
        .price-sub {
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 2rem;
            display: block;
        }

        .features-list {
            list-style: none;
            margin-bottom: 2.5rem;
        }
        .features-list li {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 300;
        }
        .features-list li i {
            color: var(--accent);
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
            width: 30px; height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Button */
        .action-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        [data-theme="neon"] .action-btn {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 25px rgba(176, 0, 255, 0.4);
        }
        [data-theme="neon"] .action-btn:hover {
            box-shadow: 0 0 40px rgba(176, 0, 255, 0.6);
        }

        /* Top Controls */
        .top-controls {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 20;
        }
        .icon-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--secondary);
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .icon-btn:hover {
            background: var(--primary);
            color: #000;
            transform: rotate(15deg);
        }

        /* Mobile Responsive */
        @media (max-width: 950px) {
            .interface { grid-template-columns: 1fr; text-align: center; gap: 2rem; padding: 1.5rem; }
            .info-panel { align-items: center; }
            .info-panel h1 { font-size: 4rem; }
            .stats-row { justify-content: center; }
            .card-panel { padding: 2rem; }
            .top-controls { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body data-theme="black">

    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <h2 style="letter-spacing: 8px; font-weight: 800;">ONIX</h2>
        <div class="loader-line"><div class="loader-progress"></div></div>
    </div>

    <!-- Background -->
    <canvas id="canvas-bg"></canvas>
    <div class="ambient-light light-top"></div>
    <div class="ambient-light light-bottom"></div>

    <!-- Top Controls -->
    <div class="top-controls">
        <button class="icon-btn" id="lang-toggle" title="Language">
            <i class="fas fa-globe"></i>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Theme">
            <i class="fas fa-bolt"></i>
        </button>
    </div>

    <!-- Main Content -->
    <div class="interface" id="ui-layer">
        
        <!-- Left Side -->
        <div class="info-panel">
            <h1>ONIX<br>SYSTEM</h1>
            <p class="subtitle" id="desc-text">
                Абсолютное превосходство в эмуляции. Стабильность, скорость и полная незаметность для античита.
            </p>
            
            <div class="stats-row">
                <div class="stat-item">
                    <h3>550₽</h3>
                    <span id="label-price">ЦЕНА</span>
                </div>
                <div class="stat-item">
                    <h3>60</h3>
                    <span id="label-fps">FPS LOCK</span>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="card-panel">
            <div>
                <span class="price-tag">550₽</span>
                <span class="price-sub" id="price-sub">Полный доступ навсегда</span>
                
                <ul class="features-list">
                    <li><i class="fas fa-check"></i> <span id="f1">Стабильные 60 FPS</span></li>
                    <li><i class="fas fa-mouse-pointer"></i> <span id="f2">Raw Mouse Input</span></li>
                    <li><i class="fas fa-shield-alt"></i> <span id="f3">Undetected защита</span></li>
                    <li><i class="fas fa-rocket"></i> <span id="f4">Оптимизация ядра</span></li>
                </ul>
            </div>

            <button class="action-btn" id="get-btn">
                <i class="fab fa-telegram-plane"></i> <span id="btn-text">КУПИТЬ В ЛС</span>
            </button>
        </div>
    </div>

    <script>
        const texts = {
            ru: {
                desc: "Абсолютное превосходство в эмуляции. Стабильность, скорость и полная незаметность для античита.",
                priceLabel: "ЦЕНА",
                fpsLabel: "FPS LOCK",
                priceSub: "Полный доступ навсегда",
                f1: "Стабильные 60 FPS",
                f2: "Чистый ввод мыши",
                f3: "Undetected защита",
                f4: "Оптимизация ядра",
                btn: "КУПИТЬ В ЛС"
            },
            en: {
                desc: "Absolute dominance in emulation. Stability, speed and complete invisibility to anti-cheat.",
                priceLabel: "PRICE",
                fpsLabel: "FPS LOCK",
                priceSub: "Lifetime access",
                f1: "Stable 60 FPS",
                f2: "Raw Mouse Input",
                f3: "Undetected protection",
                f4: "Core optimization",
                btn: "BUY IN DM"
            }
        };

        let lang = 'ru';
        let theme = 'black';

        const els = {
            desc: document.getElementById('desc-text'),
            lPrice: document.getElementById('label-price'),
            lFps: document.getElementById('label-fps'),
            pSub: document.getElementById('price-sub'),
            f1: document.getElementById('f1'),
            f2: document.getElementById('f2'),
            f3: document.getElementById('f3'),
            f4: document.getElementById('f4'),
            btn: document.getElementById('btn-text')
        };

        // Preloader
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('preloader').style.display = 'none';
                    document.getElementById('ui-layer').classList.add('visible');
                }, 500);
            }, 1500);
        };

        // Language Switch
        document.getElementById('lang-toggle').addEventListener('click', () => {
            lang = lang === 'ru' ? 'en' : 'ru';
            const t = texts[lang];
            els.desc.textContent = t.desc;
            els.lPrice.textContent = t.priceLabel;
            els.lFps.textContent = t.fpsLabel;
            els.pSub.textContent = t.priceSub;
            els.f1.textContent = t.f1;
            els.f2.textContent = t.f2;
            els.f3.textContent = t.f3;
            els.f4.textContent = t.f4;
            els.btn.textContent = t.btn;
        });

        // Theme Switch
        document.getElementById('theme-toggle').addEventListener('click', () => {
            theme = theme === 'black' ? 'neon' : 'black';
            document.body.setAttribute('data-theme', theme);
        });

        // DIRECT LINK TO TELEGRAM
        document.getElementById('get-btn').addEventListener('click', () => {
            window.location.href = "https://t.me/apatiyav";
        });

        // --- CANVAS ANIMATION ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h;
        let particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 2;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) {
                    this.y = h;
                    this.x = Math.random() * w;
                }
            }
            draw() {
                ctx.fillStyle = theme === 'neon' ? `rgba(176, 0, 255, ${this.opacity})` : `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            
            // Draw subtle grid
            ctx.strokeStyle = theme === 'neon' ? 'rgba(176, 0, 255, 0.05)' : 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            
            const gridSize = 80;
            const offset = (Date.now() / 50) % gridSize;

            for (let x = 0; x <= w; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }
            for (let y = offset; y <= h; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
